name: mol-evo
channels:
  - conda-forge
  - pytorch
  - defaults
dependencies:
  # Core scientific packages
  - python=3.10
  - rdkit
  - periodictable
  - seaborn
  - pymoo
  - numpy
  - pandas
  - matplotlib
  - scipy
  - h5py
  - scikit-learn

  # Docking dependencies for SmartCADD
  # NOTE: smina removed due to dependency conflicts - install separately
  - xtb          # Quantum mechanics for geometry optimization
  - openbabel    # Molecule format conversion (PDB <-> PDBQT)
  - pymol-open-source  # Visualization

  # Quantum chemistry
  - pyscf
  - ase
  - dftbplus
  - dftd4
  - tblite
  - tblite-python

  # PyTorch (CPU/CUDA version from pytorch channel)
  # NOTE: For AMD ROCm GPU support, install PyTorch ROCm build via pip instead:
  #   pip install torch --index-url https://download.pytorch.org/whl/rocm6.2
  - pytorch::pytorch

  # Other utilities
  - flask

  - pip:
    # Molecular embeddings (ChemBERTa-2 for CVT-MOME)
    - transformers
    - umap-learn
    # SELFIES molecular string encoding
    - selfies
    # CMA-MAE quality-diversity optimisation (GridArchive, EvolutionStrategyEmitter, Scheduler)
    - ribs
